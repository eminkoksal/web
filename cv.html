<style>
  /* ---- CV print stylesheet ---- */
  @media print {
    @page { margin: 18mm 14mm; size: A4; }

    /* Hide chrome that doesn't belong on the printed CV */
    nav, footer, .cv-toc, .cv-hero__actions, .cv-footer-cta { display: none !important; }
    /* Hide the floating top nav-pill container too */
    body > * > nav, .nav-pill { display: none !important; }

    html, body { background: #FFFFFF !important; color: #000 !important; }
    main { animation: none !important; }

    /* Compact section spacing for print */
    .cv-section { padding: 24px 0 !important; background: transparent !important; break-inside: avoid; }
    .cv-section--break { break-before: page; page-break-before: always; }

    /* Single column, ignore decorative offsets */
    .container { padding: 0 !important; max-width: 100% !important; }

    /* Ghost watermarks off in print */
    .ghost, [class*="ghost"] { display: none !important; }

    /* Hide circular satellite buttons / external link circles */
    .cv-cite a[target="_blank"] { color: #000 !important; border: 0 !important; }
    .cv-cite__ext { display: none !important; }

    /* Smaller hero on print */
    .cv-hero { padding: 0 0 16px !important; }
    .cv-hero h1.display { font-size: 28pt !important; line-height: 1.1 !important; }

    /* Headings */
    h2 { font-size: 16pt !important; }
    h3, .cv-pub-group { font-size: 11pt !important; }
    p, li, td, th { font-size: 10pt !important; line-height: 1.4 !important; }

    /* Citation rows: keep tight */
    .cv-cite { padding: 6px 0 !important; }

    /* Avoid breaking individual citations across pages */
    .cv-cite, tr, li { break-inside: avoid; page-break-inside: avoid; }
  }
</style>
